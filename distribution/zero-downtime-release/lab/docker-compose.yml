# 拓扑:nginx(L7 LB)──▶ app1 / app2(两个 FastAPI 副本)
# 入口:http://localhost:8080
services:
  app1:
    build: ./app
    environment:
      INSTANCE: app1
      WORK_SECONDS: "2"        # /work 的耗时,代表"在途请求"
    stop_grace_period: 30s     # = k8s 的 terminationGracePeriodSeconds:SIGTERM 后给 30s 排空再 SIGKILL

  app2:
    build: ./app
    environment:
      INSTANCE: app2
      WORK_SECONDS: "2"
    stop_grace_period: 30s

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - app1
      - app2
