events {}

http {
    upstream app {
        server app1:8000 max_fails=1 fail_timeout=2s;
        server app2:8000 max_fails=1 fail_timeout=2s;

        # 复用到后端的连接(HTTP keep-alive)。这正是 ch05 讲的"长连接":
        # 后端消失时,这些复用连接会先 reset 一下,再触发下面的重试。
        keepalive 16;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://app;
            proxy_http_version 1.1;
            proxy_set_header Connection "";       # 配合 upstream keepalive

            # 关键:新连接打到"正在消失"的后端被拒/超时时,自动改打另一台健康的。
            # 这是 nginx OSS 唯一能做的"容错"——被动重试,不是主动摘流量。
            proxy_next_upstream error timeout http_502 http_503;
            proxy_next_upstream_tries 2;
            proxy_connect_timeout 1s;
        }
    }
}
