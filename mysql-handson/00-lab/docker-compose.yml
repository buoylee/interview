name: mysql-handson

services:
  mysql-primary:
    image: mysql:8.0.36
    container_name: mysql-primary
    command:
      - --defaults-extra-file=/etc/mysql/conf.d/primary.cnf
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sbtest
    ports:
      - "3306:3306"
    volumes:
      - ./my.cnf/primary.cnf:/etc/mysql/conf.d/primary.cnf:ro
      - ./init:/docker-entrypoint-initdb.d:ro
      - mysql-primary-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s

  sysbench:
    image: severalnines/sysbench:latest
    platform: linux/amd64
    container_name: sysbench
    profiles: ["load"]
    depends_on:
      mysql-primary:
        condition: service_healthy
    entrypoint: ["sleep", "infinity"]

  mysqld-exporter:
    image: prom/mysqld-exporter:v0.15.1
    container_name: mysqld-exporter
    profiles: ["obs"]
    depends_on:
      mysql-primary:
        condition: service_healthy
    command:
      - --mysqld.address=mysql-primary:3306
      - --mysqld.username=root
      - --collect.info_schema.innodb_metrics
      - --collect.info_schema.processlist
      - --collect.engine_innodb_status
    environment:
      MYSQLD_EXPORTER_PASSWORD: root
    ports:
      - "9104:9104"

  prometheus:
    image: prom/prometheus:v2.45.6
    container_name: prometheus
    profiles: ["obs"]
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:10.4.5
    container_name: grafana
    profiles: ["obs"]
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"

  mysql-replica:
    image: mysql:8.0.36
    container_name: mysql-replica
    profiles: ["replica"]
    command:
      - --defaults-extra-file=/etc/mysql/conf.d/replica.cnf
    environment:
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      mysql-primary:
        condition: service_healthy
    ports:
      - "3307:3306"
    volumes:
      - ./my.cnf/replica.cnf:/etc/mysql/conf.d/replica.cnf:ro
      - mysql-replica-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s

volumes:
  mysql-primary-data:
  mysql-replica-data:
