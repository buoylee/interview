global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: kafka
    static_configs:
      - targets:
          - kafka-1:5556
          - kafka-2:5556
          - kafka-3:5556
        labels:
          cluster: handson
    relabel_configs:
      - source_labels: [__address__]
        regex: "kafka-(\\d+):5556"
        target_label: broker
        replacement: "$1"
