# lab/config-matching/nginx.conf
# 驗證 ch01 location 優先級 + ch02 rewrite flag 行為
#
# 優先級由高到低:
#   1. = (精確比對,命中即停)
#   2. ^~ (前綴非正則,命中即停,不再看正則)
#   3. ~  /  ~*  (正則,按出現順序第一個命中即停)
#   4. 最長一般前綴 (無正則命中時回退)

events {}

http {
    server {
        listen 80;
        server_name _;

        # -------------------------------------------------------
        # 優先級 1:= 精確比對 — ch01 精確匹配,命中即停
        # 測試路徑: /exact
        # -------------------------------------------------------
        location = /exact {
            return 200 "matched: exact\n";
        }

        # -------------------------------------------------------
        # 優先級 2:^~ 前綴非正則 — ch01 前綴止步,不再比正則
        # 測試路徑: /prefix-stop/x
        # -------------------------------------------------------
        location ^~ /prefix-stop/ {
            return 200 "matched: prefix-stop\n";
        }

        # -------------------------------------------------------
        # 優先級 3a:~ 大小寫敏感正則 — ch01 正則按順序,先到先得
        # 測試路徑: /api/users
        # (放在 ~* image 前面,確認順序效果)
        # -------------------------------------------------------
        location ~ ^/api/ {
            return 200 "matched: regex-api\n";
        }

        # -------------------------------------------------------
        # 優先級 3b:~* 大小寫不敏感正則 — ch01 正則按順序
        # 測試路徑: /a.JPG  (大寫副檔名確認不敏感)
        # -------------------------------------------------------
        location ~* \.(jpg|png)$ {
            return 200 "matched: regex-image\n";
        }

        # -------------------------------------------------------
        # ch02 rewrite last — 改 URI 後重走 location 匹配
        # 測試路徑: /old/thing  →  rewrite →  /new/thing  → 命中 /new/
        # -------------------------------------------------------
        location /old/ {
            rewrite ^/old/(.*)$ /new/$1 last;
        }

        # -------------------------------------------------------
        # rewrite last 的落點
        # 測試路徑: /new/thing (由 /old/thing rewrite 而來)
        # -------------------------------------------------------
        location /new/ {
            return 200 "matched: new\n";
        }

        # -------------------------------------------------------
        # 優先級 4:最長一般前綴回退 — ch01 無正則命中時兜底
        # 測試路徑: /whatever
        # -------------------------------------------------------
        location / {
            return 200 "matched: longest-prefix\n";
        }
    }
}
