services:
  backend:
    image: python:3-alpine
    command: python /app/backend.py
    volumes:
      - ./backend.py:/app/backend.py:ro
    expose:
      - "5000"

  nginx:
    image: nginx:alpine
    ports:
      - "18081:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
