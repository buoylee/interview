# proxy-cache lab — ch05 驗證：HIT/MISS/STALE + proxy_cache_lock 防擊穿

proxy_cache_path /var/cache/nginx/proxy
    levels=1:2
    keys_zone=my_cache:1m
    max_size=10m
    inactive=60s
    use_temp_path=off;

server {
    listen 80;

    # /cached/ — 標準快取，驗證 MISS → HIT
    location /cached/ {
        proxy_pass         http://backend:5000/;
        proxy_cache        my_cache;
        proxy_cache_key    "$uri";
        proxy_cache_valid  200 10s;   # 命中 10 秒
        proxy_cache_lock   on;        # 同一 key 同一時刻只有一個請求去回源
        add_header         X-Cache-Status $upstream_cache_status;
        proxy_set_header   Host $host;
    }

    # /stale/ — 額外允許 stale 回應
    location /stale/ {
        proxy_pass              http://backend:5000/;
        proxy_cache             my_cache;
        proxy_cache_key         "$uri";
        proxy_cache_valid       200 5s;
        proxy_cache_lock        on;
        proxy_cache_use_stale   error timeout updating;
        add_header              X-Cache-Status $upstream_cache_status;
        proxy_set_header        Host $host;
    }
}
