user  nginx;
worker_processes  1;

events {
    worker_connections  1024;
}

http {
    # 各自獨立的限速區（避免互相消耗 token）
    # 1r/s：每秒只允許 1 個 token，連發 10 個並行請求效果明顯
    limit_req_zone $binary_remote_addr zone=strict_zone:10m rate=1r/s;
    limit_req_zone $binary_remote_addr zone=burst_zone:10m rate=1r/s;

    # 超過限速回傳 429
    limit_req_status 429;

    server {
        listen 80;

        # /strict/ — 無 burst，超限直接 429
        # 注意：用 proxy_pass 而非 return，確保 limit_req（access phase）先執行
        location /strict/ {
            limit_req zone=strict_zone;
            proxy_pass http://127.0.0.1:8080;
        }

        # /burst/ — burst=5 nodelay，允許瞬間超量但不排隊
        location /burst/ {
            limit_req zone=burst_zone burst=5 nodelay;
            proxy_pass http://127.0.0.1:8080;
        }

        # 內部 dummy backend：只回 200 ok
        location /backend/ {
            internal;
            return 200 "ok\n";
        }
    }

    # dummy upstream server，監聽 8080
    server {
        listen 8080;
        location / {
            return 200 "ok\n";
        }
    }
}
