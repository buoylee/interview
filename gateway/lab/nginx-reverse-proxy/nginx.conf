# 對應 ch01:反向代理引擎。最小可跑的 L7 反代範例。
worker_processes auto;                 # worker 數 = CPU 核(ch01 §1)

events {
    worker_connections 1024;           # 每個 worker 能撐的並發連線(epoll,ch01 §2)
}

http {
    # upstream:輪詢負載均衡到兩個後端(ch01 §3、§5)
    #
    # 注意:這裡「故意不開」keepalive。keepalive 連線池(ch01 §3)會復用一條
    # 已建立的暖連線,序列化請求時會一直黏在同一個後端,把輪詢效果蓋掉。
    # 連線池是 ch01 正文的教學點;此 lab 的目的是「看見輪詢」,故省略它。
    upstream backend {
        server echo1:5678;
        server echo2:5678;
    }

    server {
        listen 8080;

        # 根路徑:輪詢打到兩個後端(回應在 echo1/echo2 之間交替)
        location / {
            proxy_pass http://backend;
        }

        # L7 按 path 路由:/a 永遠定向 echo1(展示 L7 認得 path,ch01 §5)
        location /a {
            proxy_pass http://echo1:5678;
        }
    }
}
