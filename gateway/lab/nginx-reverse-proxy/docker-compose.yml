services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - echo1
      - echo2

  echo1:
    image: hashicorp/http-echo
    command: ["-text=hello from echo1", "-listen=:5678"]

  echo2:
    image: hashicorp/http-echo
    command: ["-text=hello from echo2", "-listen=:5678"]
