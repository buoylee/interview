# Redis 配置不支持行内注释,注释必须独立成行。

# ---- 网络 ----
bind 0.0.0.0
# protected-mode 关:lab 内网用;12 章安全 scenario 再开
protected-mode no
port 6379

# ---- 内存 / 淘汰(04 章 scenario 会改 policy)----
maxmemory 256mb
maxmemory-policy noeviction

# ---- 持久化(05 章 scenario 会切 always / 关 aof 对比)----
appendonly yes
appendfsync everysec
save 60 1000

# ---- 慢查询(12 章):阈值 10ms(单位微秒)----
slowlog-log-slower-than 10000
slowlog-max-len 128

# ---- 延迟监控(12 章 LATENCY DOCTOR)----
latency-monitor-threshold 100

# ---- 编码转换阈值(02 章 scenario 直接调,这里放默认值便于对照)----
hash-max-listpack-entries 128
hash-max-listpack-value 64
list-max-listpack-size 128
set-max-intset-entries 512
set-max-listpack-entries 128
set-max-listpack-value 64
zset-max-listpack-entries 128
zset-max-listpack-value 64

# ---- io-threads(01 章 scenario 切换;默认 1 表示单 IO 线程)----
io-threads 1

# ---- 键空间通知(03/09 章)----
notify-keyspace-events ""
